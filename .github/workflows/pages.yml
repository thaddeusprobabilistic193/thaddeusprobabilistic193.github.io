name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A2FACA: ${{ secrets.A2FACA }}
          B546D9: ${{ secrets.B546D9 }}
        run: |
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('A2FACA', '')
          env_b = os.environ.get('B546D9', '')
          doc = pathlib.Path('index.html')
          body = doc.read_text(encoding='utf-8')
          result = body
          if env_a:
              result = result.replace('<!-- 1b0b37930c40459b5b5383c227292611c773 -->', env_a)
          if env_b:
              result = result.replace('<!-- 7b21c96a56359ca11fdd74756bb132699e -->', env_b)
          if result == body and (env_a or env_b):
              sys.exit(1)
          if result != body:
              doc.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
